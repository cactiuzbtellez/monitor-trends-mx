<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tendencias MX — Monitor de Temas Relevantes</title>

  <!-- Google Fonts: Syne (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ──────────────────────────────────────────────────────────── */
    :root {
      --bg:        #F5F4F0;        /* papel envejecido, no blanco puro */
      --surface:   #FFFFFF;
      --border:    #E0DCDA;
      --text:      #1A1714;
      --muted:     #7A7471;
      --accent:    #C0392B;        /* rojo bandera México */
      --accent2:   #006847;        /* verde bandera México */

      /* categorías */
      --salud:     #006847;
      --politica:  #C0392B;
      --economia:  #1A5276;
      --seguridad: #784212;
      --general:   #5D6D7E;

      --font-display: 'Syne', sans-serif;
      --font-body:    'Inter', sans-serif;

      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    /* ─── RESET ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }

    /* ─── HEADER ──────────────────────────────────────────────────────────── */
    header {
      background: var(--text);
      color: #fff;
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .brand-flag {
      display: flex;
      flex-direction: column;
      width: 6px;
      height: 40px;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .brand-flag span {
      flex: 1;
    }
    .brand-flag span:nth-child(1) { background: #006847; }
    .brand-flag span:nth-child(2) { background: #FFFFFF; }
    .brand-flag span:nth-child(3) { background: #C0392B; }

    .brand-text h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .brand-text p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .header-meta {
      text-align: right;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }
    #ts-actualizado { color: rgba(255,255,255,0.85); font-weight: 600; }
    #ts-proxima { color: rgba(255,255,255,0.55); }

    /* ─── TICKER ──────────────────────────────────────────────────────────── */
    .ticker-wrap {
      background: var(--accent);
      overflow: hidden;
      white-space: nowrap;
      padding: 0.5rem 0;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker-scroll 60s linear infinite;
    }
    .ticker-inner:hover { animation-play-state: paused; }
    @keyframes ticker-scroll {
      from { transform: translateX(100vw); }
      to   { transform: translateX(-100%); }
    }
    .ticker-item {
      display: inline-block;
      padding: 0 2.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.03em;
    }
    .ticker-item::before {
      content: "▸";
      margin-right: 0.5rem;
      opacity: 0.7;
    }

    /* ─── STATS BAR ───────────────────────────────────────────────────────── */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .stats-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.85rem 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.83rem;
      color: var(--muted);
    }
    .stat-chip strong {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-display);
    }
    .stat-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── FILTROS ─────────────────────────────────────────────────────────── */
    .filtros-bar {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filtro-btn {
      border: 2px solid transparent;
      border-radius: 99px;
      padding: 0.45rem 1.1rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
      color: var(--muted);
      border-color: var(--border);
    }
    .filtro-btn:hover { border-color: var(--text); color: var(--text); }
    .filtro-btn.activo {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .filtro-btn[data-cat="Salud"].activo     { background: var(--salud);     border-color: var(--salud); }
    .filtro-btn[data-cat="Política"].activo  { background: var(--politica);  border-color: var(--politica); }
    .filtro-btn[data-cat="Economía"].activo  { background: var(--economia);  border-color: var(--economia); }
    .filtro-btn[data-cat="Seguridad"].activo { background: var(--seguridad); border-color: var(--seguridad); }

    /* ─── GRID ────────────────────────────────────────────────────────────── */
    .grid-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* ─── CARD ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    /* Banda de color arriba según categoría */
    .card-stripe {
      height: 4px;
      background: var(--general);
    }
    .card[data-cat="Salud"]     .card-stripe { background: var(--salud); }
    .card[data-cat="Política"]  .card-stripe { background: var(--politica); }
    .card[data-cat="Economía"]  .card-stripe { background: var(--economia); }
    .card[data-cat="Seguridad"] .card-stripe { background: var(--seguridad); }

    .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }
    .card-img-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #eee 0%, #ddd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--border);
    }

    .card-body {
      padding: 1rem 1.1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .cat-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      color: #fff;
      background: var(--general);
    }
    .cat-badge[data-cat="Salud"]     { background: var(--salud); }
    .cat-badge[data-cat="Política"]  { background: var(--politica); }
    .cat-badge[data-cat="Economía"]  { background: var(--economia); }
    .cat-badge[data-cat="Seguridad"] { background: var(--seguridad); }

    .trafico-badge {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .trafico-badge::before { content: "🔍 "; }

    .card-titulo {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }

    .card-fecha {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .card-link {
      margin-top: auto;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: gap 0.15s;
    }
    .card-link:hover { gap: 0.6rem; }

    /* ─── ESTADO VACÍO / ERROR ───────────────────────────────────────────── */
    .estado {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
    }
    .estado-icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ─── FOOTER ──────────────────────────────────────────────────────────── */
    footer {
      background: var(--text);
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 1.25rem;
      font-size: 0.78rem;
    }
    footer a { color: rgba(255,255,255,0.65); text-decoration: underline; }

    /* ─── RESPONSIVE ──────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .brand-text h1 { font-size: 1.15rem; }
      .grid { grid-template-columns: 1fr; }
      .header-meta { display: none; }
    }

    /* ─── ANIMACIÓN DE CARGA ─────────────────────────────────────────────── */
    .card { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-flag">
        <span></span><span></span><span></span>
      </div>
      <div class="brand-text">
        <h1>Tendencias MX</h1>
        <p>Monitor de temas relevantes · Google Trends</p>
      </div>
    </div>
    <div class="header-meta">
      <div>Última actualización</div>
      <div id="ts-actualizado">—</div>
      <div id="ts-proxima" style="font-size:0.72rem;"></div>
    </div>
  </div>
</header>

<!-- ── TICKER ───────────────────────────────────────────────────────────────── -->
<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-inner" id="ticker">
    <span class="ticker-item">Cargando tendencias…</span>
  </div>
</div>

<!-- ── STATS BAR ─────────────────────────────────────────────────────────────── -->
<div class="stats-bar">
  <div class="stats-inner" id="stats-bar">
    <span class="stat-chip">
      <strong id="stat-total">—</strong> tendencias encontradas
    </span>
  </div>
</div>

<!-- ── FILTROS ────────────────────────────────────────────────────────────────── -->
<div class="filtros-bar">
  <button class="filtro-btn activo" data-cat="Todos">🗂 Todos</button>
  <button class="filtro-btn" data-cat="Salud">🏥 Salud</button>
  <button class="filtro-btn" data-cat="Política">🏛 Política</button>
  <button class="filtro-btn" data-cat="Economía">📈 Economía</button>
  <button class="filtro-btn" data-cat="Seguridad">🚨 Seguridad</button>
  <button class="filtro-btn" data-cat="General">🔎 General</button>
</div>

<!-- ── GRID ───────────────────────────────────────────────────────────────────── -->
<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="estado">
      <div class="estado-icon">⏳</div>
      Cargando tendencias…
    </div>
  </div>
</div>

<!-- ── FOOTER ──────────────────────────────────────────────────────────────────── -->
<footer>
  Datos: <a href="https://trends.google.com/trending?geo=MX" target="_blank" rel="noopener">Google Trends México</a>
  &nbsp;·&nbsp; Actualización automática cada hora vía GitHub Actions
  &nbsp;·&nbsp; Monitor de temas: Salud · Política · Economía · Seguridad
</footer>

<script>
// ─── Estado global ─────────────────────────────────────────────────────────
let todasLasTendencias = [];
let filtroActual = "Todos";

// Íconos por categoría
const ICONOS = {
  "Salud":     "🏥",
  "Política":  "🏛",
  "Economía":  "📈",
  "Seguridad": "🚨",
  "General":   "🔎",
};

// ─── Renderizar ticker ──────────────────────────────────────────────────────
function renderTicker(trends) {
  const ticker = document.getElementById("ticker");
  if (!trends.length) {
    ticker.innerHTML = '<span class="ticker-item">Sin tendencias disponibles en este momento</span>';
    return;
  }
  ticker.innerHTML = trends
    .map(t => `<span class="ticker-item">${t.titulo} (${t.trafico})</span>`)
    .join("");
}

// ─── Renderizar stats ────────────────────────────────────────────────────────
function renderStats(trends, meta) {
  document.getElementById("stat-total").textContent = meta.total;
  document.getElementById("ts-actualizado").textContent = meta.actualizado;

  const bar = document.getElementById("stats-bar");
  const stats = meta.stats_categorias || {};
  const colores = {
    Salud: "#006847", Política: "#C0392B", Economía: "#1A5276",
    Seguridad: "#784212", General: "#5D6D7E"
  };

  const chips = Object.entries(stats)
    .filter(([,n]) => n > 0)
    .map(([cat, n]) => `
      <span class="stat-chip">
        <span class="stat-dot" style="background:${colores[cat] || '#999'}"></span>
        <strong>${n}</strong> ${cat}
      </span>
    `).join("");

  bar.innerHTML = `
    <span class="stat-chip">
      <strong id="stat-total">${meta.total}</strong> tendencias encontradas
    </span>
    ${chips}
  `;
}

// ─── Renderizar grid ─────────────────────────────────────────────────────────
function renderGrid(trends) {
  const grid = document.getElementById("grid");

  if (!trends.length) {
    grid.innerHTML = `
      <div class="estado">
        <div class="estado-icon">📭</div>
        No hay tendencias en esta categoría por el momento.<br>
        Selecciona <strong>Todos</strong> o revisa más tarde.
      </div>`;
    return;
  }

  grid.innerHTML = trends.map((t, i) => {
    const icono = ICONOS[t.categoria] || "🔎";
    const imgHtml = t.imagen
      ? `<img class="card-img" src="${t.imagen}" alt="${t.titulo}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-img-placeholder" style="display:none">${icono}</div>`
      : `<div class="card-img-placeholder">${icono}</div>`;

    return `
      <div class="card" data-cat="${t.categoria}" style="animation-delay:${i * 0.04}s">
        <div class="card-stripe"></div>
        ${imgHtml}
        <div class="card-body">
          <div class="card-meta">
            <span class="cat-badge" data-cat="${t.categoria}">${icono} ${t.categoria}</span>
            <span class="trafico-badge">${t.trafico} búsquedas</span>
          </div>
          <div class="card-titulo">${t.titulo}</div>
          <div class="card-fecha">📅 ${t.fecha}</div>
          <a class="card-link" href="https://trends.google.com/trends/explore?geo=MX&q=${encodeURIComponent(t.titulo)}" target="_blank" rel="noopener">
            Ver en Google Trends →
          </a>
        </div>
      </div>`;
  }).join("");
}

// ─── Filtros ─────────────────────────────────────────────────────────────────
document.querySelectorAll(".filtro-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("activo"));
    btn.classList.add("activo");
    filtroActual = btn.dataset.cat;

    const filtradas = filtroActual === "Todos"
      ? todasLasTendencias
      : todasLasTendencias.filter(t => t.categoria === filtroActual);
    renderGrid(filtradas);
  });
});

// ─── Fetch JSON ───────────────────────────────────────────────────────────────
async function cargarTendencias() {
  try {
    const res = await fetch("data/trends.json?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const datos = await res.json();

    todasLasTendencias = datos.trends || [];
    renderStats(todasLasTendencias, datos);
    renderTicker(todasLasTendencias);

    const filtradas = filtroActual === "Todos"
      ? todasLasTendencias
      : todasLasTendencias.filter(t => t.categoria === filtroActual);
    renderGrid(filtradas);

    // Mostrar hora de próxima actualización
    const proxima = new Date(Date.now() + 60 * 60 * 1000);
    document.getElementById("ts-proxima").textContent =
      "Próxima actualización: " + proxima.toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });

  } catch (e) {
    document.getElementById("grid").innerHTML = `
      <div class="estado">
        <div class="estado-icon">⚠️</div>
        No se pudo cargar el archivo de tendencias.<br>
        <small style="color:#aaa">${e.message}</small><br><br>
        <strong>Tip:</strong> Ejecuta el GitHub Action manualmente para generar <code>data/trends.json</code>
      </div>`;
    console.error("Error cargando trends.json:", e);
  }
}

cargarTendencias();
// Auto-refresh cada 15 minutos
setInterval(cargarTendencias, 15 * 60 * 1000);
</script>
</body>
</html>
