<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tendencias MX — Google Trends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #F5F4F0;
      --surface: #FFFFFF;
      --border:  #E0DCDA;
      --text:    #1A1714;
      --muted:   #7A7471;
      --rojo:    #C0392B;
      --verde:   #006847;
      --font-d:  'Syne', sans-serif;
      --font-b:  'Inter', sans-serif;
      --radius:  10px;
      --shadow:  0 2px 12px rgba(0,0,0,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* HEADER */
    header { background: var(--text); color: #fff; padding: 0 1.5rem; }
    .header-inner {
      max-width: 1280px; margin: 0 auto; padding: 1.2rem 0;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .flag { display: flex; flex-direction: column; width: 6px; height: 38px; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .flag span { flex: 1; }
    .flag span:nth-child(1) { background: var(--verde); }
    .flag span:nth-child(2) { background: #fff; }
    .flag span:nth-child(3) { background: var(--rojo); }
    .brand-text h1 { font-family: var(--font-d); font-size: 1.45rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .brand-text p  { font-size: 0.76rem; color: rgba(255,255,255,0.45); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    .header-meta   { text-align: right; font-size: 0.78rem; color: rgba(255,255,255,0.45); line-height: 1.7; }
    #ts-actualizado { color: rgba(255,255,255,0.9); font-weight: 600; }

    /* TICKER */
    .ticker-wrap { background: var(--rojo); overflow: hidden; white-space: nowrap; padding: 0.45rem 0; }
    .ticker-inner { display: inline-block; animation: ticker 60s linear infinite; }
    .ticker-inner:hover { animation-play-state: paused; }
    @keyframes ticker { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
    .ticker-item { display: inline-block; padding: 0 2.5rem; font-size: 0.79rem; font-weight: 600; color: #fff; }
    .ticker-item::before { content: "▸ "; opacity: 0.7; }

    /* BARRA SUPERIOR */
    .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); }
    .top-bar-inner {
      max-width: 1280px; margin: 0 auto; padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
    }
    .stat { font-size: 0.82rem; color: var(--muted); display: flex; align-items: center; gap: 0.4rem; }
    .stat strong { font-family: var(--font-d); font-size: 1.1rem; color: var(--text); }

    /* PERÍODO */
    .periodo-bar {
      max-width: 1280px; margin: 0 auto; padding: 1rem 1.5rem 0;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .periodo-label { font-size: 0.82rem; color: var(--muted); font-weight: 600; margin-right: 0.25rem; }
    .periodo-btn {
      border: 2px solid var(--border); border-radius: 99px; padding: 0.38rem 1rem;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; background: var(--surface); color: var(--muted); transition: all 0.13s;
    }
    .periodo-btn:hover { border-color: var(--text); color: var(--text); }
    .periodo-btn.activo { background: var(--text); color: #fff; border-color: var(--text); }

    /* CONTADOR */
    .contador { max-width: 1280px; margin: 0 auto; padding: 0.6rem 1.5rem 0; font-size: 0.8rem; color: var(--muted); }
    .contador span { font-weight: 600; color: var(--text); }

    /* GRID */
    .grid-wrap { max-width: 1280px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.1rem; }

    /* CARD */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      transition: transform 0.14s, box-shadow 0.14s;
      animation: fadeUp 0.25s ease both;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .card-stripe { height: 3px; background: var(--rojo); }

    .card-img { width: 100%; height: 148px; object-fit: cover; display: block; background: var(--bg); }
    .card-img-ph {
      width: 100%; height: 148px;
      background: linear-gradient(135deg, #ece9e6 0%, #dedad7 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--border);
    }

    .card-body { padding: 0.9rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }

    .trafico-badge {
      align-self: flex-start;
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 0.15rem 0.45rem; border-radius: 4px;
    }
    .trafico-badge::before { content: "🔍 "; }

    .card-titulo { font-family: var(--font-d); font-size: 1.02rem; font-weight: 700; line-height: 1.25; }
    .card-desc   { font-size: 0.79rem; color: var(--muted); line-height: 1.5; }

    .card-footer {
      margin-top: auto; padding-top: 0.7rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .card-fecha { font-size: 0.72rem; color: var(--muted); }
    .card-link  { font-size: 0.78rem; font-weight: 600; color: var(--rojo); white-space: nowrap; transition: gap 0.12s; }
    .card-link:hover { text-decoration: underline; }

    /* VACÍO / ERROR */
    .estado { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--muted); line-height: 2; }
    .estado-icon { font-size: 3rem; margin-bottom: 0.75rem; }

    /* FOOTER */
    footer { background: var(--text); color: rgba(255,255,255,0.4); text-align: center; padding: 1rem; font-size: 0.75rem; }
    footer a { color: rgba(255,255,255,0.6); text-decoration: underline; }

    @media (max-width: 640px) {
      .brand-text h1 { font-size: 1.1rem; }
      .grid { grid-template-columns: 1fr; }
      .header-meta { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="flag"><span></span><span></span><span></span></div>
      <div class="brand-text">
        <h1>Tendencias MX</h1>
        <p>Google Trends México · Lo más buscado</p>
      </div>
    </div>
    <div class="header-meta">
      <div>Última actualización</div>
      <div id="ts-actualizado">—</div>
    </div>
  </div>
</header>

<div class="ticker-wrap">
  <div class="ticker-inner" id="ticker">
    <span class="ticker-item">Cargando tendencias…</span>
  </div>
</div>

<div class="top-bar">
  <div class="top-bar-inner">
    <div class="stat"><strong id="stat-total">—</strong> tendencias</div>
    <div class="stat" id="stat-rango"></div>
  </div>
</div>

<div class="periodo-bar">
  <span class="periodo-label">Período:</span>
  <button class="periodo-btn" data-dias="1">Hoy</button>
  <button class="periodo-btn activo" data-dias="7">7 días</button>
  <button class="periodo-btn" data-dias="30">30 días</button>
</div>

<div class="contador" id="contador"></div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="estado"><div class="estado-icon">⏳</div>Cargando…</div>
  </div>
</div>

<footer>
  Datos: <a href="https://trends.google.com/trending?geo=MX" target="_blank" rel="noopener">Google Trends México</a>
  &nbsp;·&nbsp; Actualización automática cada hora via GitHub Actions
</footer>

<script>
let todos = [];
let filtroDias = 7;

function filtrarPorDias(trends, dias) {
  const corte = new Date(Date.now() - dias * 86400000);
  return trends.filter(t => !t.fecha_dt || new Date(t.fecha_dt) >= corte);
}

function renderTicker(trends) {
  const el = document.getElementById("ticker");
  if (!trends.length) { el.innerHTML = '<span class="ticker-item">Sin tendencias disponibles</span>'; return; }
  el.innerHTML = trends.map(t =>
    `<span class="ticker-item">${t.titulo}${t.trafico && t.trafico !== "—" ? " · " + t.trafico : ""}</span>`
  ).join("");
}

function renderGrid(trends) {
  const grid    = document.getElementById("grid");
  const counter = document.getElementById("contador");
  const statTotal = document.getElementById("stat-total");
  const statRango = document.getElementById("stat-rango");

  statTotal.textContent = trends.length;
  const diasLabel = filtroDias === 1 ? "hoy" : `últimos ${filtroDias} días`;
  statRango.textContent = diasLabel;
  counter.innerHTML = `Mostrando <span>${trends.length}</span> tendencias · ${diasLabel}`;

  if (!trends.length) {
    grid.innerHTML = `<div class="estado"><div class="estado-icon">📭</div>Sin tendencias para este período.<br>Prueba con <strong>30 días</strong>.</div>`;
    return;
  }

  grid.innerHTML = trends.map((t, i) => {
    const imgHtml = t.imagen
      ? `<img class="card-img" src="${t.imagen}" alt="" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-img-ph" style="display:none">📈</div>`
      : `<div class="card-img-ph">📈</div>`;

    const traficoBadge = (t.trafico && t.trafico !== "—")
      ? `<span class="trafico-badge">${t.trafico} búsquedas</span>` : "";

    const descHtml = t.descripcion
      ? `<div class="card-desc">${t.descripcion}</div>` : "";

    return `
      <div class="card" style="animation-delay:${Math.min(i, 15) * 0.03}s">
        <div class="card-stripe"></div>
        ${imgHtml}
        <div class="card-body">
          ${traficoBadge}
          <div class="card-titulo">${t.titulo}</div>
          ${descHtml}
          <div class="card-footer">
            <span class="card-fecha">📅 ${t.fecha}</span>
            <a class="card-link" href="${t.link}" target="_blank" rel="noopener">Ver en Trends →</a>
          </div>
        </div>
      </div>`;
  }).join("");
}

function aplicar() {
  const filtrados = filtrarPorDias(todos, filtroDias);
  renderTicker(filtrados);
  renderGrid(filtrados);
}

document.querySelectorAll(".periodo-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".periodo-btn").forEach(b => b.classList.remove("activo"));
    btn.classList.add("activo");
    filtroDias = parseInt(btn.dataset.dias);
    aplicar();
  });
});

async function cargar() {
  try {
    const r = await fetch("data/trends.json?t=" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    const datos = await r.json();
    todos = datos.trends || [];
    document.getElementById("ts-actualizado").textContent = datos.actualizado || "—";
    aplicar();
  } catch (e) {
    document.getElementById("grid").innerHTML = `
      <div class="estado">
        <div class="estado-icon">⚠️</div>
        No se pudo cargar <code>data/trends.json</code><br>
        <small>${e.message}</small><br><br>
        Ejecuta el GitHub Action manualmente para generar el archivo.
      </div>`;
  }
}

cargar();
setInterval(cargar, 15 * 60 * 1000);
</script>
</body>
</html>
