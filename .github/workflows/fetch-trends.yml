name: Fetch Tendencias MX

on:
  schedule:
    - cron: "0 * * * *"   # Cada hora
  workflow_dispatch:        # Ejecución manual

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install feedparser requests pytrends

      - name: Ejecutar fetch
        run: python scripts/fetch_trends.py

      - name: Commit trends.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.json
          git diff --cached --quiet || git commit -m "chore: tendencias $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
