name: Fetch Google Trends MX

on:
  schedule:
    - cron: "0 * * * *"   # Cada hora en punto
  workflow_dispatch:        # Permite correrlo manualmente desde Actions

jobs:
  fetch-trends:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Necesario para hacer git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run fetch script
        run: python scripts/fetch_trends.py

      - name: Commit & push trends.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.json
          git diff --cached --quiet || git commit -m "chore: actualizar trends $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
